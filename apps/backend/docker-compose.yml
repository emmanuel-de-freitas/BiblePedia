services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: biblepedia_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biblepedia.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgadmin_data:
